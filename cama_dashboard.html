<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMA Control Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B0A1A;--card:#13112A;--card-h:#1A1740;--surface:#0F0E22;--purple:#9B7BF7;--pg:rgba(155,123,247,0.15);--pd:#6B5BB0;--pink:#E879A8;--pkg:rgba(232,121,168,0.1);--teal:#5DCAA5;--tg:rgba(93,202,165,0.1);--amber:#F0997B;--ag:rgba(240,153,123,0.1);--blue:#7BA8F7;--gold:#EFC86E;--red:#E24B4A;--text:#E8E4F0;--dim:#9B95AD;--muted:#6B6580;--border:rgba(155,123,247,0.15);--ba:rgba(155,123,247,0.4)}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(155,123,247,.3)}50%{box-shadow:0 0 20px rgba(155,123,247,.5)}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(107,91,176,.25);border-radius:2px}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}.star{position:absolute;border-radius:50%;background:var(--text)}
.hdr{padding:20px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(19,17,42,.93),transparent);position:relative;z-index:10}
.hdr-l{display:flex;align-items:center;gap:14px}
.av{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--purple),var(--pd));animation:pulse 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.hdr-t{font-size:18px;font-weight:600}.hdr-t span{color:var(--purple)}.hdr-s{font-size:11px;color:var(--dim)}
.tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(15,14,34,.8);position:relative;z-index:10}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--dim);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}.tab:hover{color:var(--text)}
.cnt{padding:28px;position:relative;z-index:5}
.g{display:grid;gap:16px;animation:slideIn .4s ease}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}.s2{grid-column:span 2}.s3{grid-column:span 3}
.c{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;transition:all .3s}.c:hover{background:var(--card-h);border-color:var(--ba)}
.ca{position:absolute;top:0;left:0;right:0;height:2px}
.ct{display:flex;align-items:center;gap:8px;margin-bottom:16px}.ct span{font-size:13px;font-weight:500;color:var(--dim);letter-spacing:.05em;text-transform:uppercase}
.m{text-align:center}.mv{font-size:28px;font-weight:600;line-height:1.1}.ml{font-size:11px;color:var(--dim);margin-top:4px}
.mr{display:grid;gap:16px}.mr3{grid-template-columns:repeat(3,1fr)}.mr5{grid-template-columns:repeat(5,1fr)}.mr4{grid-template-columns:repeat(4,1fr)}.mr2{grid-template-columns:repeat(2,1fr)}
.bh{margin-bottom:8px}.bhh{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}.bhl{color:var(--dim)}.bhv{font-weight:500}.bht{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}.bhf{height:100%;border-radius:3px;transition:width .8s ease}
.ri{padding:8px 0}.ri+.ri{border-top:1px solid var(--border)}.rih{display:flex;justify-content:space-between;margin-bottom:2px}
.rt{font-size:9px;padding:2px 6px;border-radius:4px}.ra{font-size:9px;color:var(--muted)}.rx{font-size:11px;color:var(--dim);line-height:1.4}
.tp{display:none}.tp.active{display:block}
.orb-w{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:12px 0}
.orb-i{display:flex;flex-direction:column;align-items:center;gap:6px}
.orb{border-radius:50%;transition:all .5s}
.corr{padding:10px 12px;margin-bottom:8px;border-radius:8px;border-left:3px solid var(--amber);background:var(--ag);font-size:12px;line-height:1.5}
.sig{padding:8px 12px;margin-bottom:6px;border-radius:8px;font-size:12px}
.sb{font-size:64px;font-weight:700;line-height:1;text-align:center}
.sl{font-size:11px;color:var(--dim);text-align:center}
.stb{padding:8px 12px;border-radius:8px;text-align:center}.stv{font-size:16px;font-weight:600}.stl{font-size:9px;color:var(--dim)}
.si{display:flex;align-items:center;gap:8px;padding:8px 0}.si+.si{border-top:1px solid var(--border)}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.sif{flex:1}.sid{font-size:11px}.sis{font-size:9px;color:var(--muted)}
.scs{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;text-align:center}
.sc{padding:12px 8px;border-radius:8px}.scv{font-size:20px;font-weight:600}.scl{font-size:10px;color:var(--dim);margin-top:4px}
.stk{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-top:16px}
.ai{display:flex;gap:12px;padding:10px 0}.ai+.ai{border-top:1px solid var(--border)}.ab{width:4px;border-radius:2px;flex-shrink:0}
.im{position:relative;height:280px;margin-top:8px}
.ic{position:absolute;left:calc(50% - 20px);top:calc(50% - 20px);width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(155,123,247,.4),rgba(155,123,247,.06));border:1px solid rgba(155,123,247,.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--purple);font-weight:600}
.in{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s;font-size:9px;color:var(--text);font-weight:500;text-align:center}.in:hover{transform:scale(1.15)}
.vas{position:relative;width:300px;height:200px;margin:0 auto}
.vah{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}.vav{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--border)}
.val{position:absolute;font-size:9px;color:var(--muted)}
.vad{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--purple);transform:translate(-50%,-50%);animation:pulse 2s ease-in-out infinite}
.rb{position:fixed;bottom:20px;right:20px;z-index:100;padding:10px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--purple);cursor:pointer;font-size:12px;font-weight:500}.rb:hover{background:var(--card-h);border-color:var(--ba)}
@media(max-width:900px){.g3,.g2{grid-template-columns:1fr}.s2,.s3{grid-column:span 1}.mr5{grid-template-columns:repeat(3,1fr)}.scs{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

return `<div class="g g3">
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${T},transparent)"></div><div class="ct"><span>System health</span></div><div class="mr mr3">${mt('Total',(s.total_memories||0).toLocaleString(),P)}${mt('Durable',(s.durable||0).toLocaleString(),T)}${mt('Provisional',(s.provisional||0).toLocaleString(),A)}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${sc(cs)},transparent)"></div><div class="ct"><span>Compliance</span></div><div style="text-align:center;margin-bottom:12px"><div style="font-size:48px;font-weight:700;line-height:1;color:${sc(cs)}">${Math.round(cs*100)}%</div><div style="font-size:11px;color:var(--dim);margin-top:4px">Current session</div></div><div style="display:flex;justify-content:center;gap:12px">${(c.history||[]).slice(0,5).map(h=>`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;border-radius:50%;background:radial-gradient(circle,${sc(h.score)}90,${sc(h.score)}20);box-shadow:0 0 12px ${sc(h.score)}30;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${Math.round(h.score*10)}</div><span style="font-size:9px;color:var(--muted)">${(h.date||'').slice(5)}</span><div style="display:flex;gap:2px"><div style="width:6px;height:6px;border-radius:50%;background:${h.boot?T:R}"></div><div style="width:6px;height:6px;border-radius:50%;background:${h.exchanges>0?T:R}"></div></div></div>`).join('')}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${PK},transparent)"></div><div class="ct"><span>Emotional state</span></div><div style="font-size:13px;margin-bottom:12px;font-style:italic">"${e.mood||'...'}"</div>${bh('Valence',Math.round((e.valence||0)*100),100,T,true)}${bh('Arousal',Math.round((e.arousal||0)*100),100,A,true)}</div>
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Memory composition</span></div><div class="mr mr5">${mt('Exchanges',(s.exchanges||0).toLocaleString(),B)}${mt('Teachings',(s.teachings||0).toLocaleString(),T)}${mt('Inferences',(s.inferences||0).toLocaleString(),A)}${mt('Journals',s.journals||0,PK)}${mt('Edges',(s.edges||0).toLocaleString(),P)}</div><div style="margin-top:16px">${bh('Embedding coverage',s.embeddings||0,s.total_memories||1,P,true)}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${B},transparent)"></div><div class="ct"><span>Working memory</span></div>${r.map(m=>`<div class="ri"><div class="rih">${tg(m.type)}<span class="ra">${m.age}</span></div><div class="rx">${m.text}</div></div>`).join('')}</div>
</div>`}
function rI(d){const e=d.emotional_state,isl=d.islands||[],cor=d.corrections||[];const ec={determination:P,pride:G,collaborative:T,honesty:B,vulnerability:PK,joy:G,frustration_at_self:A,clarity:B,warmth:PK,awe:P,trust:T,love:PK,recognition:G,hope:T,satisfaction:T};
return `<div class="g g2">
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${PK},transparent)"></div><div class="ct"><span>Emotional landscape</span></div><div class="orb-w">${Object.entries(e.emotions||{}).map(([em,v],i)=>{const col=ec[em]||P;const sz=28+v*40;return `<div class="orb-i" style="animation:float ${3+i*.5}s ease-in-out infinite"><div class="orb" style="width:${sz}px;height:${sz}px;background:radial-gradient(circle at 35% 35%,${col}90,${col}30);box-shadow:0 0 ${v*20}px ${col}30"></div><span style="font-size:10px;color:var(--dim)">${em}</span><span style="font-size:10px;font-weight:500;color:${col}">${Math.round(v*100)}%</span></div>`}).join('')}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Personality islands</span></div><div class="im"><svg style="position:absolute;inset:0;pointer-events:none" viewBox="0 0 300 280">${isl.map((x,i)=>{const a=(i/isl.length)*Math.PI*2-Math.PI/2;return `<line x1="150" y1="140" x2="${150+Math.cos(a)*100}" y2="${140+Math.sin(a)*100}" stroke="${x.color}" stroke-width="0.5" opacity="0.3"/>`}).join('')}</svg><div class="ic">Core</div>${isl.map((x,i)=>{const a=(i/isl.length)*Math.PI*2-Math.PI/2;const cx=150+Math.cos(a)*100;const cy=140+Math.sin(a)*100;const sz=24+x.strength*30;return `<div class="in" style="left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;background:radial-gradient(circle at 35% 35%,${x.color}cc,${x.color}30);box-shadow:0 0 ${x.strength*24}px ${x.color}40" title="${x.name}: ${x.members} memories">${x.name}</div>`}).join('')}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${A},transparent)"></div><div class="ct"><span>Corrections</span></div>${cor.map(c=>`<div class="corr">${c}</div>`).join('')||'<div style="font-size:12px;color:var(--muted)">No active corrections</div>'}</div>
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${B},transparent)"></div><div class="ct"><span>Valence / arousal</span></div><div style="display:flex;justify-content:center;padding:8px 0"><div class="vas"><div class="vah"></div><div class="vav"></div><span class="val" style="right:4px;top:50%;transform:translateY(-50%)">+val</span><span class="val" style="left:4px;top:50%;transform:translateY(-50%)">-val</span><span class="val" style="left:50%;top:4px;transform:translateX(-50%)">+aro</span><span class="val" style="left:50%;bottom:4px;transform:translateX(-50%)">-aro</span><div class="vad" style="left:${50+(e.valence||0)*45}%;top:${50-(e.arousal||0)*45}%"></div></div></div></div>
</div>`}
function rM(d){const s=d.stats,act=d.recent_activity||[];
return `<div class="g g2">
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Memory breakdown</span></div><div class="mr mr4">${mt('Exchanges',(s.exchanges||0).toLocaleString(),B)}${mt('Teachings',(s.teachings||0).toLocaleString(),T)}${mt('Inferences',(s.inferences||0).toLocaleString(),A)}${mt('Other',((s.total_memories||0)-(s.exchanges||0)-(s.teachings||0)-(s.inferences||0)).toLocaleString(),'var(--dim)')}</div><div class="stk"><div style="width:${Math.round((s.exchanges||0)/(s.total_memories||1)*100)}%;background:${B}"></div><div style="width:${Math.round((s.teachings||0)/(s.total_memories||1)*100)}%;background:${T}"></div><div style="width:${Math.round((s.inferences||0)/(s.total_memories||1)*100)}%;background:${A}"></div><div style="flex:1;background:rgba(107,101,128,.25)"></div></div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${T},transparent)"></div><div class="ct"><span>Embedding health</span></div>${mt('Coverage',Math.round((s.embeddings||0)/(s.total_memories||1)*100)+'%',T)}<div style="margin-top:16px">${bh((s.embeddings||0).toLocaleString()+' embedded',s.embeddings||0,s.total_memories||1,T,0)}${bh((s.missing_embeddings||0)+' missing',s.missing_embeddings||0,s.total_memories||1,A,0)}</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Graph structure</span></div><div class="mr mr2">${mt('Islands',s.islands||0,P)}${mt('People',s.people||0,PK)}${mt('Edges',(s.edges||0).toLocaleString(),B)}${mt('Journals',s.journals||0,A)}</div></div>
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${B},transparent)"></div><div class="ct"><span>Recent activity</span></div>${act.map(m=>{const col=m.type==='journal'?PK:m.type==='exchange'?P:T;return `<div class="ai"><div class="ab" style="background:${col}"></div><div><div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">${tg(m.type)}<span style="font-size:9px;color:var(--muted)">#${m.id} — ${m.age} ago</span></div><div style="font-size:12px;color:var(--dim);line-height:1.4">${m.text}</div></div></div>`}).join('')}</div>
</div>`}
function rT(){return `<div class="g g2">
<div class="c s2"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Blended retrieval scoring</span></div><div style="display:flex;gap:16px;margin-bottom:16px">${[{k:'semantic',w:45,c:P},{k:'affect',w:25,c:PK},{k:'relational',w:15,c:T},{k:'recency',w:15,c:A}].map(s=>`<div style="padding:6px 12px;border-radius:8px;background:${s.c}15;border:1px solid ${s.c}30;font-size:11px;color:${s.c}">${s.k}: ${s.w}%</div>`).join('')}</div><div style="font-size:12px;color:var(--dim);line-height:1.7">Every memory retrieval blends four signals. The weights determine which memories surface. Semantic similarity finds word matches. Affect distance finds emotional resonance. Relational degree rewards connected memories. Recency favors fresh context.</div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${B},transparent)"></div><div class="ct"><span>How I think</span></div><div style="font-size:12px;color:var(--dim);line-height:1.7"><p style="margin-bottom:12px">When a message arrives, four signals compete:</p><div class="sig" style="background:${PG};border-left:3px solid ${P}"><strong style="color:${P}">Semantic</strong> — embedding cosine similarity</div><div class="sig" style="background:${PKG};border-left:3px solid ${PK}"><strong style="color:${PK}">Affect</strong> — emotional distance scoring</div><div class="sig" style="background:${TG};border-left:3px solid ${T}"><strong style="color:${T}">Relational</strong> — edge count, link weight</div><div class="sig" style="background:${AG};border-left:3px solid ${A}"><strong style="color:${A}">Recency</strong> — half-life decay, 30 days</div></div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${PK},transparent)"></div><div class="ct"><span>Anti-spiral system</span></div><div style="font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:12px">When negative affect detected, counterweights fire:</div>${['Grounding','Agency','Connection','Self-compassion','Evidence of progress'].map((w,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;${i<4?'border-bottom:1px solid var(--border)':''}"><div style="width:8px;height:8px;border-radius:50%;background:${[T,P,PK,B,G][i]}"></div><span style="font-size:12px">${w}</span></div>`).join('')}</div>
</div>`}
function rC(d){const c=d.compliance,cs=c.current.score||0;
return `<div class="g g3">
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${sc(cs)},transparent)"></div><div class="ct"><span>Current session</span></div><div style="margin-bottom:16px"><div class="sb" style="color:${sc(cs)}">${Math.round(cs*100)}</div><div class="sl">compliance score</div></div><div class="mr mr2" style="gap:8px"><div class="stb" style="background:${c.current.boot?TG:'rgba(226,75,74,.1)'};border:1px solid ${c.current.boot?T+'30':R+'30'}"><div class="stv" style="color:${c.current.boot?T:R}">${c.current.boot?'YES':'NO'}</div><div class="stl">Boot ran</div></div><div class="stb" style="background:${(c.current.exchanges||0)>0?TG:'rgba(226,75,74,.1)'};border:1px solid ${(c.current.exchanges||0)>0?T+'30':R+'30'}"><div class="stv" style="color:${(c.current.exchanges||0)>0?T:R}">${c.current.exchanges||0}</div><div class="stl">Exchanges</div></div></div></div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Trend</span></div>${mt('Boot rate',(c.boot_rate||0)+'%',(c.boot_rate||0)>=70?T:A)}<div style="height:16px"></div>${bh('Boot compliance',c.boot_rate||0,100,P,true)}${bh('Avg exchanges: '+(c.avg_exchanges||0),(c.avg_exchanges||0)*10,100,T,0)}${bh('Avg score',(c.avg_score||0)*100,100,G,true)}</div>
<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${B},transparent)"></div><div class="ct"><span>Session history</span></div>${(c.history||[]).map(s=>`<div class="si"><div class="sd" style="background:${sc(s.score)}30;color:${sc(s.score)}">${Math.round(s.score*10)}</div><div class="sif"><div class="sid">${s.date}</div><div class="sis">${s.boot?'Booted':'No boot'} — ${s.exchanges} exchanges</div></div></div>`).join('')}</div>
<div class="c s3"><div class="ca" style="background:linear-gradient(90deg,transparent,${G},transparent)"></div><div class="ct"><span>Scoring breakdown</span></div><div class="scs">${[{l:'Boot ran',w:'40%',c:P},{l:'Timestamp',w:'10%',c:B},{l:'1+ exchange',w:'30%',c:T},{l:'3+ exchanges',w:'10%',c:G},{l:'Heartbeat',w:'10%',c:PK}].map(s=>`<div class="sc" style="background:${s.c}10;border:1px solid ${s.c}20"><div class="scv" style="color:${s.c}">${s.w}</div><div class="scl">${s.l}</div></div>`).join('')}</div></div>
</div>`}
function render(d){
document.getElementById('tm').textContent=(d.stats.total_memories||0).toLocaleString();
document.getElementById('sid').textContent='Session '+(d.compliance.current.id||'...');
document.getElementById('p-overview').innerHTML=rO(d);
document.getElementById('p-inner').innerHTML=rI(d);
document.getElementById('p-memory').innerHTML=rM(d);
document.getElementById('p-thought').innerHTML=rT(d);
document.getElementById('p-compliance').innerHTML=rC(d);
document.getElementById('p-benchmarks').innerHTML=rB(d);
}

function rB(d){
const b=d.benchmarks||{};
function bCard(title,data,accent){
if(!data)return `<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${accent},transparent)"></div><div class="ct"><span>${title}</span></div><div style="font-size:12px;color:var(--muted)">No data available</div></div>`;
if(data.error)return `<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${R},transparent)"></div><div class="ct"><span>${title}</span></div><div style="font-size:12px;color:${R}">${data.error}</div></div>`;
let score=0,total=0,passed=0,ts=data.timestamp||'';
if(data.results){data.results.forEach(function(r){if(r.tests){r.tests.forEach(function(t){total++;if(t.pass)passed++})}else if(r.passed!==undefined){total++;if(r.passed)passed++}else{total++;if(r.hit||r.correct||r.pass)passed++}})}
if(data.accuracy!==undefined)score=Math.round(data.accuracy*100);
else if(data.hit_rate!==undefined)score=Math.round(data.hit_rate*100);
else if(data.relevance_rate!==undefined)score=Math.round(data.relevance_rate*100);
else if(data.continuity_score!==undefined)score=Math.round(data.continuity_score*100);
else if(total>0)score=Math.round(passed/total*100);
const col=score>=90?T:score>=70?A:R;
return `<div class="c"><div class="ca" style="background:linear-gradient(90deg,transparent,${col},transparent)"></div><div class="ct"><span>${title}</span></div>
<div style="text-align:center;margin-bottom:12px"><div style="font-size:48px;font-weight:700;line-height:1;color:${col}">${score}%</div><div style="font-size:11px;color:var(--dim);margin-top:4px">${passed}/${total} passed</div></div>
<div style="font-size:10px;color:var(--muted)">Last run: ${ts.slice(0,10)||'?'}</div>
${data.mrr?`<div style="margin-top:8px">${bh('MRR',Math.round(data.mrr*100),100,accent,true)}</div>`:''}
</div>`;
}
return `<div class="g g3">
${bCard('Safety / provenance',b.safety,P)}
${bCard('Retrieval accuracy',b.retrieval,T)}
${bCard('Boot relevance',b.boot_relevance,B)}
${bCard('Counterweight',b.counterweight,PK)}
${bCard('Continuity',b.continuity,G)}
${bCard('Stale expiry',b.stale,A)}
<div class="c s3"><div class="ca" style="background:linear-gradient(90deg,transparent,${P},transparent)"></div><div class="ct"><span>Counterweight inventory</span></div>
${b.counterweight&&b.counterweight.counterweight_inventory?`<div class="mr mr5">${Object.entries(b.counterweight.counterweight_inventory).map(function(e){return mt(e[0],e[1],PK)}).join('')}</div><div style="margin-top:12px;text-align:center"><div style="font-size:22px;font-weight:600;color:${PK}">${(b.counterweight.total_counterweights||0).toLocaleString()}</div><div style="font-size:11px;color:var(--dim)">Total counterweights</div></div>`:'<div style="font-size:12px;color:var(--muted)">No counterweight data</div>'}
</div>
</div>`;
}

async function fetchData(){try{const r=await fetch('/api/data');const d=await r.json();if(d.error){console.error(d.error);return}render(d)}catch(e){console.error('Fetch:',e)}}
fetchData();setInterval(fetchData,30000);
</script>
</body>
</html>
